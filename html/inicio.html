  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, setDoc, doc, serverTimestamp, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    // Configuración real de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBIN5wILjhmFhHFxBwuJuKPsZyUNziPDFQ",
      authDomain: "losturcos2.firebaseapp.com",
      projectId: "losturcos2",
      storageBucket: "losturcos2.firebasestorage.app",
      messagingSenderId: "353259282248",
      appId: "1:353259282248:web:212a5dbe7ee28ed5cedd7d"
    };
    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Registrar usuario desde formulario
    document.getElementById('form-registro').addEventListener('submit', async function(e) {
      e.preventDefault();
      const nombre = document.getElementById('nombre-reg').value;
      const email = document.getElementById('email-reg').value;
      const password = document.getElementById('pass-reg').value;
      const msg = document.getElementById('msg-registro');
      msg.textContent = 'Registrando...';
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'usuarios', userCredential.user.uid), {
          nombre: nombre,
          email: email,
          creado: serverTimestamp()
        });
        msg.textContent = 'Usuario registrado correctamente';
        document.getElementById('form-registro').reset();
      } catch (error) {
        msg.textContent = 'Error: ' + error.message;
      }
    });

    // Guardar producto desde formulario
    document.getElementById('form-producto').addEventListener('submit', async function(e) {
      e.preventDefault();
      const nombre = document.getElementById('nombre-prod').value;
      const precio = parseInt(document.getElementById('precio-prod').value);
      const categoria = document.getElementById('categoria-prod').value;
      const img = document.getElementById('img-prod').value;
      const msg = document.getElementById('msg-producto');
      msg.textContent = 'Guardando producto...';
      try {
        await addDoc(collection(db, 'productos'), {
          nombre: nombre,
          precio: precio,
          categoria: categoria,
          img: img,
          creado: serverTimestamp()
        });
        msg.textContent = 'Producto guardado correctamente';
        document.getElementById('form-producto').reset();
        mostrarProductosFirestore();
      } catch (error) {
        msg.textContent = 'Error: ' + error.message;
      }
    });

    // Mostrar productos guardados en Firestore
    async function mostrarProductosFirestore() {
      const contenedor = document.getElementById('productos-firestore');
      if (!contenedor) return;
      contenedor.innerHTML = 'Cargando...';
      try {
        const q = query(collection(db, 'productos'), orderBy('creado', 'desc'));
        const snapshot = await getDocs(q);
        if (snapshot.empty) {
          contenedor.innerHTML = '<p class="text-gray-500">No hay productos guardados.</p>';
          return;
        }
        let html = '';
        snapshot.forEach(docSnap => {
          const p = docSnap.data();
          html += `
            <div class="border rounded-lg p-4 flex flex-col items-center shadow">
              <img src="${p.img}" alt="${p.nombre}" class="w-full h-40 object-cover mb-3 rounded">
              <h3 class="text-lg font-bold text-gold-lux mb-1">${p.nombre}</h3>
              <div class="text-turquoise-jewel font-semibold mb-1">$${p.precio?.toLocaleString('es-CL') ?? ''}</div>
              <div class="text-xs text-dark-royal/70 mb-2">${p.categoria}</div>
            </div>
          `;
        });
        contenedor.innerHTML = html;
      } catch (err) {
        contenedor.innerHTML = 'Error al cargar productos: ' + err.message;
      }
    }
    // Mostrar productos al cargar
    document.addEventListener('DOMContentLoaded', mostrarProductosFirestore);
  </script>

  <script>
        // Mostrar productos guardados en Firestore
        function mostrarProductosFirestore() {
          const contenedor = document.getElementById('productos-firestore');
          if (!contenedor) return;
          contenedor.innerHTML = 'Cargando...';
          db.collection('productos').orderBy('creado', 'desc').get()
            .then(snapshot => {
              if (snapshot.empty) {
                contenedor.innerHTML = '<p class="text-gray-500">No hay productos guardados.</p>';
                return;
              }
              let html = '';
              snapshot.forEach(doc => {
                const p = doc.data();
                html += `
                  <div class="border rounded-lg p-4 flex flex-col items-center shadow">
                    <img src="${p.img}" alt="${p.nombre}" class="w-full h-40 object-cover mb-3 rounded">
                    <h3 class="text-lg font-bold text-gold-lux mb-1">${p.nombre}</h3>
                    <div class="text-turquoise-jewel font-semibold mb-1">$${p.precio?.toLocaleString('es-CL') ?? ''}</div>
                    <div class="text-xs text-dark-royal/70 mb-2">${p.categoria}</div>
                  </div>
                `;
              });
              contenedor.innerHTML = html;
            })
            .catch(err => {
              contenedor.innerHTML = 'Error al cargar productos: ' + err.message;
            });
        }
        // Mostrar productos al cargar y después de agregar uno
        document.addEventListener('DOMContentLoaded', mostrarProductosFirestore);
        const formProd = document.getElementById('form-producto');
        if (formProd) {
          formProd.addEventListener('submit', function() {
            setTimeout(mostrarProductosFirestore, 1000);
          });
        }
    // Configuración de tu proyecto Firebase (reemplaza con tus datos reales)
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_AUTH_DOMAIN",
      projectId: "TU_PROJECT_ID",
      storageBucket: "TU_STORAGE_BUCKET",
      messagingSenderId: "TU_MESSAGING_SENDER_ID",
      appId: "TU_APP_ID"
    };
    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Registrar usuario desde formulario
    document.getElementById('form-registro').addEventListener('submit', function(e) {
      e.preventDefault();
      const nombre = document.getElementById('nombre-reg').value;
      const email = document.getElementById('email-reg').value;
      const password = document.getElementById('pass-reg').value;
      const msg = document.getElementById('msg-registro');
      msg.textContent = 'Registrando...';
      auth.createUserWithEmailAndPassword(email, password)
        .then(userCredential => {
          return db.collection('usuarios').doc(userCredential.user.uid).set({
            nombre: nombre,
            email: email,
            creado: firebase.firestore.FieldValue.serverTimestamp()
          });
        })
        .then(() => {
          msg.textContent = 'Usuario registrado correctamente';
          document.getElementById('form-registro').reset();
        })
        .catch(error => {
          msg.textContent = 'Error: ' + error.message;
        });
    });

    // Guardar producto desde formulario
    document.getElementById('form-producto').addEventListener('submit', function(e) {
      e.preventDefault();
      const nombre = document.getElementById('nombre-prod').value;
      const precio = parseInt(document.getElementById('precio-prod').value);
      const categoria = document.getElementById('categoria-prod').value;
      const img = document.getElementById('img-prod').value;
      const msg = document.getElementById('msg-producto');
      msg.textContent = 'Guardando producto...';
      db.collection('productos').add({
        nombre: nombre,
        precio: precio,
        categoria: categoria,
        img: img,
        creado: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(() => {
        msg.textContent = 'Producto guardado correctamente';
        document.getElementById('form-producto').reset();
      })
      .catch(error => {
        msg.textContent = 'Error: ' + error.message;
      });
    });
  </script>
