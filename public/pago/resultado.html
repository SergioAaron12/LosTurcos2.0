<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultado del pago - Los Turco 2.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/custom.css" />
</head>
<body class="min-h-screen bg-[#f4efe7] text-slate-900">
  <main class="mx-auto max-w-4xl px-4 py-10 md:px-6">
    <section class="overflow-hidden rounded-[32px] border border-white/80 bg-white shadow-[0_24px_90px_rgba(15,23,42,0.1)]">
      <div id="payment-hero" class="border-b border-slate-100 px-6 py-8 md:px-10 md:py-10">
        <div id="payment-badge" class="inline-flex items-center rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700">Procesando resultado...</div>
        <h1 id="payment-title" class="mt-5 text-3xl font-bold text-slate-900 md:text-4xl" style="font-family: 'Cinzel Decorative', serif;">Estamos consultando tu pago</h1>
        <p id="payment-description" class="mt-3 max-w-2xl text-sm leading-6 text-slate-600 md:text-base">Esta página muestra el estado final de la transacción y el comprobante del comercio.</p>
      </div>

      <div class="grid gap-0 lg:grid-cols-[1fr_0.95fr]">
        <section class="px-6 py-8 md:px-10">
          <div id="payment-message" class="rounded-3xl border border-slate-200 bg-slate-50 px-5 py-4 text-sm text-slate-700">Consultando la orden...</div>
          <div id="payment-order-meta" class="mt-6 hidden grid gap-4 rounded-3xl border border-slate-200 bg-slate-50 p-5 text-sm text-slate-700 md:grid-cols-2"></div>
          <div id="payment-items" class="mt-6 space-y-3"></div>
        </section>

        <aside class="border-t border-slate-100 bg-[#fff9ef] px-6 py-8 lg:border-l lg:border-t-0 md:px-10">
          <h2 class="text-xl font-semibold text-slate-900">Resumen</h2>
          <div class="mt-5 space-y-3 rounded-3xl bg-white px-5 py-5 shadow-sm">
            <div class="flex items-center justify-between text-sm text-slate-500">
              <span>Subtotal</span>
              <span id="payment-subtotal">$0</span>
            </div>
            <div class="flex items-center justify-between text-sm text-emerald-700">
              <span>Descuento</span>
              <span id="payment-discount">-$0</span>
            </div>
            <div class="flex items-center justify-between border-t border-slate-100 pt-3 text-lg font-bold text-slate-900">
              <span>Total</span>
              <span id="payment-total">$0</span>
            </div>
          </div>

          <div id="payment-transbank-data" class="mt-5 hidden rounded-3xl border border-slate-200 bg-white px-5 py-5 text-sm text-slate-700 shadow-sm"></div>

          <div class="mt-6 flex flex-col gap-3">
            <a href="../index.html" class="inline-flex items-center justify-center rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-700">Volver al catálogo</a>
            <a href="../checkout.html" class="inline-flex items-center justify-center rounded-full border border-slate-300 px-6 py-3 text-sm font-semibold text-slate-700 transition hover:bg-white">Intentar nuevamente</a>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="../js/payment-result.js"></script>
</body>
</html>
